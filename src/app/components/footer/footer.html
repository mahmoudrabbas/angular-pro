<footer class="footer">
  <div class="footer-inner">
    <!-- Brand Column -->
    <div class="footer-brand">
      <div class="brand-logo">
        <!-- <span class="logo-icon">🛒</span> -->
        <span class="logo-text display-5"><span class="text-danger">#</span>Sooq</span>
      </div>
      <p class="brand-tagline">Your trusted marketplace for everything you need, delivered fast.</p>
      <div class="social-links">
        <a href="#" class="social-btn" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-btn" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" class="social-btn" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-btn" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="footer-links">
      <h4 class="links-heading">Quick Links</h4>
      <ul>
        <li *ngFor="let link of quickLinks">
          <a [routerLink]="link.link">{{ link.label }}</a>
        </li>
      </ul>
    </div>

    <!-- Help -->
    <div class="footer-links">
      <h4 class="links-heading">Help</h4>
      <ul>
        <li *ngFor="let link of helpLinks">
          <a [routerLink]="link.link">{{ link.label }}</a>
        </li>
      </ul>
    </div>

    <!-- Contact Info Column -->
    <div class="footer-contact-col">
      <h4 class="links-heading">Contact Us</h4>
      <div class="contact-list">
        <a *ngFor="let item of contactInfo" class="contact-row" [href]="item.href">
          <div class="contact-icon">
            <i [class]="item.icon"></i>
          </div>
          <div class="contact-text">
            <span class="contact-label">{{ item.title }}</span>
            <span class="contact-value">{{ item.content }}</span>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- Footer Bottom Bar -->
  <div class="footer-bottom">
    <span>© {{ currentYear }} Sooq.com All rights reserved.</span>
    <div class="footer-bottom-links">
      <a routerLink="/privacy">Privacy Policy</a>
      <a routerLink="/terms">Terms & Conditions</a>
      <a routerLink="/sitemap">Site Map</a>
    </div>
  </div>
</footer>
