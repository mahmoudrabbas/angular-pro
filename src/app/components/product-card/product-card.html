<div class="product-item rounded wow fadeInUp" [attr.data-wow-delay]="wowDelay">
  <div class="product-item-inner border rounded">
    <div class="product-item-inner-item">
      <a [routerLink]="['/product', product.id]">
        <img
          [src]="product.image"
          class="img-fluid w-100 rounded-top"
          [alt]="product.name"
          loading="lazy"
        />
      </a>
      <div *ngIf="product.badge" [class]="product.badge === 'New' ? 'product-new' : 'product-sale'">
        {{ product.badge }}
      </div>
      <div class="product-details">
        <a [routerLink]="['/product', product.id]">
          <i class="fa fa-eye fa-1x"></i>
        </a>
      </div>
    </div>

    <div class="text-center rounded-bottom p-4">
      <a [routerLink]="['/product', product.id]" class="d-block mb-2">{{ product.category }}</a>
      <a [routerLink]="['/product', product.id]" class="d-block h4">{{ product.name }}</a>
      <del class="me-2 fs-5">{{ product.oldPrice }}</del>
      <span class="text-primary fs-5">{{ product.newPrice }}</span>
    </div>
  </div>

  <div class="product-item-add border border-top-0 rounded-bottom text-center p-4 pt-0">
    <!-- Add to Cart -->
    <a
      href="javascript:void(0)"
      class="btn border-secondary rounded-pill py-2 px-4 mb-4"
      [class.btn-primary]="!cartAdded()"
      [class.btn-success]="cartAdded()"
      [class.disabled]="cartLoading()"
      (click)="onAddToCart()"
    >
      @if (cartLoading()) {
        <span class="spinner-border spinner-border-sm me-2"></span>Adding…
      } @else if (cartAdded()) {
        <i class="fas fa-check me-2"></i>Added!
      } @else {
        <i class="fas fa-shopping-cart me-2"></i>Add To Cart
      }
    </a>

    <div class="d-flex justify-content-between align-items-center">
      <!-- Stars -->
      <div class="d-flex">
        <ng-container *ngFor="let filled of stars; let i = index">
          <i class="fas fa-star" [class.text-primary]="filled"></i>
        </ng-container>
      </div>

      <div class="d-flex">
        <!-- Compare — unchanged -->
        <a
          href="javascript:void(0)"
          class="text-primary d-flex align-items-center justify-content-center me-3"
          (click)="compare.emit(product)"
        >
          <span class="rounded-circle btn-sm-square border">
            <i class="fas fa-random"></i>
          </span>
        </a>

        <!-- ── Wishlist toggle heart ── -->
        <a
          href="javascript:void(0)"
          class="d-flex align-items-center justify-content-center"
          [class.text-danger]="wishlistAdded()"
          [class.text-primary]="!wishlistAdded()"
          [class.opacity-50]="wishlistLoading()"
          (click)="toggleWishlist()"
          [title]="wishlistAdded() ? 'Remove from wishlist' : 'Add to wishlist'"
        >
          <span
            class="rounded-circle btn-sm-square border"
            [style.background]="wishlistAdded() ? '#fff0f0' : ''"
            [style.border-color]="wishlistAdded() ? '#f5c6cb' : ''"
          >
            @if (wishlistLoading()) {
              <span
                class="spinner-border spinner-border-sm"
                style="width: 12px; height: 12px"
              ></span>
            } @else if (wishlistAdded()) {
              <i class="fas fa-heart color-danger"></i>
              <!-- solid red = in wishlist -->
            } @else {
              <i class="fas fa-heart color-primary"></i>
              <!-- blue outline = not in wishlist -->
            }
          </span>
        </a>
      </div>
    </div>
  </div>
</div>
