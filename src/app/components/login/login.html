<!-- Login Start -->
<div class="container-fluid py-5">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <!-- [class.shake] replays the shake animation each failed attempt -->
        <div
          class="bg-light rounded p-5 shadow-sm wow fadeInUp"
          data-wow-delay="0.1s"
          [class.shake]="shakeForm"
        >
          <div class="text-center mb-4">
            <h1 class="display-5 text-primary">Welcome Back</h1>
            <p class="mb-0">Please login to your account</p>
          </div>

          <!-- ── Server error alert ── -->
          <div *ngIf="errorMessage" class="error-alert" role="alert" aria-live="assertive">
            <!-- Icon -->
            <div class="error-alert__icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </div>

            <!-- Text -->
            <div class="error-alert__body">
              <span class="error-alert__title">Sign in failed</span>
              <span class="error-alert__message">{{ errorMessage }}</span>
            </div>

            <!-- Dismiss -->
            <button
              type="button"
              class="error-alert__close"
              (click)="clearError()"
              aria-label="Dismiss"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <!-- Email -->
            <div class="mb-4">
              <label for="email" class="form-label">Email Address</label>
              <input
                type="email"
                id="email"
                formControlName="email"
                placeholder="Enter your email"
                autocomplete="email"
                class="form-control rounded-pill"
                [class.is-invalid]="
                  (f['email'].invalid && f['email'].touched) || isFieldError('email')
                "
              />
              <div *ngIf="f['email'].invalid && f['email'].touched" class="text-danger mt-1 small">
                <div *ngIf="f['email'].errors?.['required']">Email is required.</div>
                <div *ngIf="f['email'].errors?.['email']">Enter a valid email address.</div>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  id="password"
                  formControlName="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  class="form-control"
                  style="border-radius: 50rem 0 0 50rem !important"
                  [class.is-invalid]="
                    (f['password'].invalid && f['password'].touched) || isFieldError('password')
                  "
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  style="border-radius: 0 50rem 50rem 0 !important"
                  (click)="togglePassword()"
                  tabindex="-1"
                  aria-label="Toggle password visibility"
                >
                  <!-- Eye open -->
                  <svg
                    *ngIf="!showPassword"
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173
                             8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0
                             3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828
                             8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465
                             1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12
                             0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"
                    />
                    <path
                      d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0
                             0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"
                    />
                  </svg>
                  <!-- Eye closed -->
                  <svg
                    *ngIf="showPassword"
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028
                             7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0
                             3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828
                             8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465
                             1.755-.165.165-.337.328-.517.486l.708.709z"
                    />
                    <path
                      d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5
                             2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5
                             3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"
                    />
                    <path
                      d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0
                             1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332
                             5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029
                             7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721
                             2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z"
                    />
                  </svg>
                </button>
              </div>
              <div
                *ngIf="f['password'].invalid && f['password'].touched"
                class="text-danger mt-1 small"
              >
                <div *ngIf="f['password'].errors?.['required']">Password is required.</div>
                <div *ngIf="f['password'].errors?.['minlength']">
                  At least 6 characters required.
                </div>
              </div>
            </div>

            <!-- Remember me & Forgot password -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="rememberMe"
                  formControlName="rememberMe"
                />
                <label class="form-check-label" for="rememberMe">Remember me</label>
              </div>
              <a routerLink="/forgot-password" class="text-primary small">Forgot password?</a>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              class="btn btn-primary rounded-pill w-100 py-3"
              [disabled]="loading"
            >
              <span
                *ngIf="loading"
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              {{ loading ? 'Signing in…' : 'Login' }}
            </button>

            <!-- Signup link -->
            <p class="text-center mt-4 mb-0">
              Don't have an account?
              <a routerLink="/signup" class="text-primary">Sign up here</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
