<aside class="sidebar">
  <div class="sidebar-profile">
    <div class="profile-avatar">{{ initials }}</div>
    <div class="profile-info">
      <p class="profile-name">{{ user()?.name || 'My Account' }}</p>
      <p class="profile-email">{{ user()?.email || 'my@email.com' }}</p>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="sidebar-link">🏠 Dashboard</a>
    <a routerLink="/orders" routerLinkActive="active" class="sidebar-link">📦 My Orders</a>
    <a routerLink="/wishlist" routerLinkActive="active" class="sidebar-link">❤️ Wishlist</a>
    <a routerLink="/addresses" routerLinkActive="active" class="sidebar-link">📍 Addresses</a>
    <a routerLink="/account-settings" routerLinkActive="active" class="sidebar-link"
      >⚙️ Account Settings</a
    >
    <button class="sidebar-link logout" (click)="logout()">🚪 Logout</button>
  </nav>
</aside>
